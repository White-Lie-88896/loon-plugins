<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunlogin AdBlock for Loon</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    body {
      margin: 0;
      padding: 32px 18px;
      background: Canvas;
      color: CanvasText;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: 0;
    }
    p {
      margin: 10px 0;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      background: Canvas;
      color: CanvasText;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    a,
    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: #0a7cff;
      color: white;
      text-decoration: none;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    button.secondary {
      background: color-mix(in srgb, CanvasText 12%, transparent);
      color: CanvasText;
    }
    code {
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .note {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      color: color-mix(in srgb, CanvasText 76%, transparent);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sunlogin AdBlock</h1>
    <p>Open this page in iPhone Safari, then tap the install button to import the plugin into Loon.</p>

    <input id="plugin-url" value="https://raw.githubusercontent.com/White-Lie-88896/loon-plugins/main/sunlogin/sunlogin-adblock.plugin" aria-label="Plugin URL">

    <div class="actions">
      <a id="install" href="#">Install in Loon</a>
      <button class="secondary" id="copy" type="button">Copy Install Link</button>
    </div>

    <p class="note">Install link:<br><code id="link"></code></p>
  </main>

  <script>
    const input = document.querySelector("#plugin-url");
    const install = document.querySelector("#install");
    const link = document.querySelector("#link");
    const copy = document.querySelector("#copy");

    function render() {
      const value = input.value.trim();
      const installUrl = "loon://import?plugin=" + encodeURIComponent(value);
      install.href = installUrl;
      link.textContent = installUrl;
    }

    input.addEventListener("input", render);
    copy.addEventListener("click", async () => {
      await navigator.clipboard.writeText(link.textContent);
      copy.textContent = "Copied";
      setTimeout(() => {
        copy.textContent = "Copy Install Link";
      }, 1200);
    });

    render();
  </script>
</body>
</html>
